<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evan Timmons Personal Site</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script>
      const savedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;
      const theme = savedTheme || (systemPrefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    </script>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Evan Timmons</div>
      <a href="./index.html">Home</a>
      <a href="./resume/index.html">Resume</a>
      <div class="dropdown">
        <button
          id="dropdown-btn"
          class="dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
        >
          Settings &#9662;
        </button>
        <div id="dropdown-menu" class="dropdown-menu">
          <button
            id="theme-toggle"
            aria-label="Toggle dark mode"
            class="dark-theme-toggle"
          >
            Switch Theme
          </button>
        </div>
      </div>
    </nav>
    <div class="container">
      <h1>Hi! I'm Evan.</h1>
      <img src="./assets/images/profilepic.jpg" alt="Me on the Buckeye Trail" />
      <h3>I'm a programmer.</h3>
      <h3>I'm a musician.</h3>
      <h5>
        I love to travel, to share good food, and to spend time with my family.
      </h5>
    </div>

    <footer>
      <h2 title="Contact Info" class="contact-header">Contact Information</h2>
      <div class="contact">
        <h5>Location: Centerville, OH</h5>
        <h5>Phone: 937-674-1033</h5>
        <h5>Email: timmonsevan@gmail.com</h5>
        <h5>
          <a href="https://www.linkedin.com/in/timmonsevan/" target="_blank"
            >LinkedIn</a
          >
        </h5>
        <h5>
          <a href="https://www.github.com/timmonsevan" target="_blank"
            >GitHub</a
          >
        </h5>
      </div>
    </footer>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
